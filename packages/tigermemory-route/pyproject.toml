[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "tigermemory-route"
version = "0.1.0"
description = "Memory routing decision engine for TigerMemory (mem0 / inbox / discard, pure functions, no MCP)"
requires-python = ">=3.10"
license = { text = "Apache-2.0" }
authors = [{ name = "tigergiant" }]
keywords = ["agent", "memory", "routing", "tigermemory"]
classifiers = [
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Operating System :: OS Independent",
]
dependencies = ["tigermemory-core"]

[project.optional-dependencies]
test = ["pytest>=7"]

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
testpaths = ["tests"]
