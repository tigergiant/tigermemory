[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "tigermemory"
version = "0.4.0"
description = "Local-first LLM wiki and memory runtime."
readme = "README.md"
requires-python = ">=3.10"
license = { text = "MIT" }
dependencies = [
  "fastapi>=0.100",
  "pydantic>=2",
  "uvicorn>=0.20",
]

[project.optional-dependencies]
mcp = ["mcp[cli]>=1.0"]
dev = [
  "httpx>=0.27",
  "pytest>=8",
]

[project.scripts]
tm = "tigermemory_cli:main"

[tool.setuptools]
py-modules = ["tigermemory_cli"]

[tool.setuptools.packages.find]
where = [
  "packages/tigermemory-answer/src",
  "packages/tigermemory-config/src",
  "packages/tigermemory-core/src",
  "packages/tigermemory-dashboard/src",
  "packages/tigermemory-digest/src",
  "packages/tigermemory-doctor/src",
  "packages/tigermemory-index/src",
  "packages/tigermemory-lessons/src",
  "packages/tigermemory-persona/src",
  "packages/tigermemory-protocols/src",
  "packages/tigermemory-publish/src",
  "packages/tigermemory-route/src",
  "packages/tigermemory-search/src",
  "packages/tigermemory-update/src",
]

[tool.setuptools.package-data]
tigermemory_dashboard = ["static/**/*"]
tigermemory_publish = [
  "templates/*",
  "templates/.codex/*",
  "templates/docs/*.md",
  "templates/docs/examples/hooks/*",
  "templates/docs/examples/mcp/*",
  "templates/wiki/*/*.md",
]
