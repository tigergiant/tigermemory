[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "tigermemory-publish"
version = "0.1.0"
description = "Commit-safe TigerMemory public distribution snapshot builder"
requires-python = ">=3.10"
license = { text = "Apache-2.0" }
authors = [{ name = "tigergiant" }]
keywords = ["llm", "wiki", "markdown", "publish", "tigermemory"]
classifiers = [
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Operating System :: OS Independent",
]

[project.scripts]
tigermemory-publish = "tigermemory_publish:main"

[project.optional-dependencies]
test = ["pytest>=7"]

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
testpaths = ["tests"]
