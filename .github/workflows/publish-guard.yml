name: Publish Guard

on:
  pull_request:
  push:
    branches:
      - master

permissions:
  contents: read

jobs:
  publish_guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install release dependencies
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install -e ".[dev]"

      - name: Run release-facing regression tests
        run: |
          python3 -m pytest \
            tests/test_tm_cli.py \
            tests/test_tm_io.py \
            tests/test_tm_review_ui.py \
            tests/test_tm_local_memory.py \
            tests/test_tm_publish.py \
            packages/tigermemory-publish/tests/test_tigermemory_publish.py \
            tests/test_pre_push_publish_smoke.py \
            tests/test_public_boundary.py \
            tests/test_dashboard_update_status.py \
            tests/test_true_split_publish.py \
            packages/tigermemory-doctor/tests/test_diagnose.py \
            packages/tigermemory-update/tests/test_tigermemory_update.py \
            -q

      - name: Publish snapshot audit via package command
        run: |
          python3 -m tigermemory_publish --dry-run --json --audit-pii

      - name: Publish snapshot audit via tm command
        run: |
          tm publish --dry-run --audit-pii --json

      - name: Public release evidence report
        run: |
          tm publish --dry-run --audit-pii --json --evidence-report --validate-checks > /tmp/tigermemory-release-evidence.json
          python3 - <<'PY'
          import json

          payload = json.load(open("/tmp/tigermemory-release-evidence.json", encoding="utf-8"))
          assert payload["ok"] is True, payload
          assert payload["module_check_validation"]["ok"] is True, payload["module_check_validation"]
          assert payload["public_boundary_validation"]["ok"] is True, payload["public_boundary_validation"]
          assert payload["release_evidence"]["schema"] == "tigermemory-public-release-evidence-v1"
          assert payload["release_evidence"]["inspection_only"] is False
          assert payload["release_evidence"]["module_details"], payload["release_evidence"]
          assert payload["release_evidence"]["snapshot_audit"]["ok"] is True
          assert payload["release_evidence"]["full_snapshot_audit"]["ok"] is True
          PY

      - name: Build snapshot and smoke local install
        shell: bash
        run: |
          set -euo pipefail
          dashboard_pid=""
          trap 'if [ -n "$dashboard_pid" ]; then kill "$dashboard_pid" 2>/dev/null || true; fi' EXIT

          snapshot="$(mktemp -d)"
          tm publish --dest "$snapshot" --json --audit-pii
          test -f "$snapshot/MODULES.md"
          test -f "$snapshot/tigermemory-public-modules.json"
          python3 - <<PY
          import json, pathlib
          snapshot = pathlib.Path("$snapshot")
          manifest = json.loads((snapshot / "tigermemory-public-modules.json").read_text(encoding="utf-8"))
          assert manifest["schema"] == "tigermemory-public-modules-v1", manifest
          assert manifest["inspection_only"] is False, manifest
          assert any(item["id"] == "public-core" for item in manifest["modules"]), manifest
          PY

      - name: Public core with external instance root smoke
        shell: bash
        run: |
          set -euo pipefail

          public_core="$(mktemp -d)"
          instance="$(mktemp -d)"
          python3 tools/tm_io.py publish --dest "$public_core" --json --audit-pii --target public-core --split-report
          snapshot="$(mktemp -d)"
          tm publish --dest "$snapshot" --json --audit-pii

          python3 -m venv .tmp/public-core-smoke-venv
          . .tmp/public-core-smoke-venv/bin/activate
          python3 -m pip install -q "$public_core"

          TIGERMEMORY_INSTANCE_ROOT="$instance" tm init --profile local
          test -f "$instance/runtime/tigermemory/profile.env"
          TIGERMEMORY_INSTANCE_ROOT="$instance" tm update status --json | python3 -c 'import json,sys; data=json.load(sys.stdin); assert data["schema"] == "tigermemory-update-status-v1", data'
          TIGERMEMORY_INSTANCE_ROOT="$instance" tm update apply --dry-run --json | python3 -c 'import json,sys; data=json.load(sys.stdin); assert data["applied"] is False, data' || test "$?" = "4"
          memory_id="$(printf 'external instance memory' | TIGERMEMORY_INSTANCE_ROOT="$instance" tm write-memory --agent codex --topic systems | python3 -c 'import json,sys; print(json.load(sys.stdin)["id"])')"
          TIGERMEMORY_INSTANCE_ROOT="$instance" tm verify --id "$memory_id" --terms "external instance" | python3 -c 'import json,sys; data=json.load(sys.stdin); assert data["direct_readback_ok"], data'

          python3 -m venv .tmp/publish-smoke-venv
          . .tmp/publish-smoke-venv/bin/activate
          python3 -m pip install -q "$snapshot"

          work="$(mktemp -d)"
          TIGERMEMORY_ROOT="$work" tm init --profile local
          TIGERMEMORY_ROOT="$work" tm profile show | python3 -c 'import sys; out=sys.stdin.read(); assert "effective=local" in out, out'
          memory_id="$(printf 'hello local memory' | TIGERMEMORY_ROOT="$work" tm write-memory --agent codex --topic systems | python3 -c 'import json,sys; print(json.load(sys.stdin)["id"])')"
          TIGERMEMORY_ROOT="$work" tm ask --offline --query "hello local memory" --scope all | python3 -c 'import json,sys; payload=json.load(sys.stdin); assert payload["offline"] is True and any(e.get("source") == "memory" for e in payload["evidence"]), payload'
          TIGERMEMORY_ROOT="$work" tm search --query "hello local" --size 3 | python3 -c 'import json,sys; data=json.load(sys.stdin); assert data["count"] >= 1, data'
          TIGERMEMORY_ROOT="$work" tm verify --id "$memory_id" --terms "hello local" | python3 -c 'import json,sys; data=json.load(sys.stdin); assert data["direct_readback_ok"] and data["search_by_terms_self_hit"], data'

          TIGERMEMORY_ROOT="$work" TIGERMEMORY_PROFILE=local tm dashboard --host 127.0.0.1 --port 9789 &
          dashboard_pid="$!"
          python3 - <<'PY'
          import http.cookiejar
          import json
          import time
          import urllib.request

          opener = urllib.request.build_opener(
              urllib.request.HTTPCookieProcessor(http.cookiejar.CookieJar())
          )
          last_error = None
          for _ in range(20):
              try:
                  response = opener.open("http://127.0.0.1:9789/health", timeout=2)
                  html = response.read().decode("utf-8", errors="replace")
                  assert response.status == 200
                  assert "/static/dashboard-common.js" in html
                  response = opener.open("http://127.0.0.1:9789/api/health/summary", timeout=2)
                  assert response.status == 200
                  json.load(response)
                  break
              except Exception as exc:
                  last_error = exc
                  time.sleep(0.5)
          else:
              raise SystemExit(f"dashboard smoke failed: {last_error!r}")
          PY
