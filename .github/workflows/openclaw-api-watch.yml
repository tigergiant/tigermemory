name: OpenClaw API Watch

on:
  schedule:
    - cron: "0 1 * * 1" # 09:00 Asia/Shanghai every Monday
  workflow_dispatch:
    inputs:
      target_version:
        description: "OpenClaw version tag without leading v; defaults to npm latest"
        required: false
        type: string

permissions:
  contents: read
  issues: write

env:
  BASELINE_VERSION: "2026.5.22"
  BASELINE_TYPES: "deploy/openclaw-ce/reference/openclaw-types-2026.5.22.snapshot.ts"

jobs:
  context-engine-types:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Resolve target version
        id: version
        shell: bash
        run: |
          if [ -n "${{ inputs.target_version }}" ]; then
            target="${{ inputs.target_version }}"
          else
            target="$(npm view openclaw version)"
          fi
          echo "target=${target}" >> "$GITHUB_OUTPUT"
          echo "OpenClaw target version: ${target}" >> "$GITHUB_STEP_SUMMARY"

      - name: Fetch upstream context-engine types
        shell: bash
        run: |
          mkdir -p .tmp/openclaw-api-watch
          curl -fsSL \
            "https://raw.githubusercontent.com/openclaw/openclaw/v${{ steps.version.outputs.target }}/src/context-engine/types.ts" \
            -o .tmp/openclaw-api-watch/types.ts

      - name: Compare with supported baseline
        id: diff
        shell: bash
        run: |
          set +e
          diff -u "$BASELINE_TYPES" .tmp/openclaw-api-watch/types.ts \
            > .tmp/openclaw-api-watch/context-engine-types.diff
          changed=$?
          set -e

          if [ "$changed" -gt 1 ]; then
            echo "diff failed with exit code ${changed}" >&2
            exit "$changed"
          fi

          if [ "$changed" -eq 0 ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No context-engine type drift from ${BASELINE_VERSION}." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          echo "changed=true" >> "$GITHUB_OUTPUT"
          {
            echo "Context-engine type drift detected."
            echo ""
            echo "- baseline: ${BASELINE_VERSION}"
            echo "- target: ${{ steps.version.outputs.target }}"
            echo "- baseline file: ${BASELINE_TYPES}"
            echo ""
            echo '```diff'
            sed -n '1,160p' .tmp/openclaw-api-watch/context-engine-types.diff
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - uses: actions/upload-artifact@v4
        if: steps.diff.outputs.changed == 'true'
        with:
          name: openclaw-context-engine-types-diff
          path: .tmp/openclaw-api-watch/context-engine-types.diff

      - uses: actions/github-script@v7
        if: steps.diff.outputs.changed == 'true'
        env:
          TARGET_VERSION: ${{ steps.version.outputs.target }}
        with:
          script: |
            const { owner, repo } = context.repo;
            const title = `[openclaw-api-watch] context-engine types changed in ${process.env.TARGET_VERSION}`;
            const query = `repo:${owner}/${repo} "${title}" in:title type:issue state:open`;
            const existing = await github.rest.search.issuesAndPullRequests({ q: query });
            if (existing.data.total_count > 0) {
              core.info(`Existing issue found: ${existing.data.items[0].html_url}`);
              return;
            }

            const body = [
              "OpenClaw `src/context-engine/types.ts` differs from the supported tigermemory-ce baseline.",
              "",
              `- Baseline: ${process.env.BASELINE_VERSION}`,
              `- Target: ${process.env.TARGET_VERSION}`,
              `- Baseline file: ${process.env.BASELINE_TYPES}`,
              `- Workflow run: ${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId}`,
              "",
              "Use `wiki/systems/openclaw-ce-api-fallback-runbook.md` before changing runtime config."
            ].join("\n");

            const issue = await github.rest.issues.create({ owner, repo, title, body });
            core.info(`Created issue: ${issue.data.html_url}`);
