name: Daily Lint

on:
  schedule:
    - cron: "0 14 * * *"  # 22:00 Asia/Shanghai
  workflow_dispatch:

permissions:
  contents: write

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # need full history for git log --since
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Configure git
        run: |
          git config user.name "tigermemory-linter"
          git config user.email "linter@tigermemory.local"

      - name: Run L4 lint
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: |
          python3 tools/tm_lint.py

      - name: Commit + push if changed
        run: |
          git add wiki/operations/lint-dashboard.md inbox/ || true
          if git diff --cached --quiet; then
            echo "No changes, skip commit"
            exit 0
          fi
          # Disable commit-msg hook (guard is tm_io.py level, GH runner doesn't have it installed)
          git commit -m "[linter] lint: daily L4 scan $(TZ=Asia/Shanghai date +%Y-%m-%d)"
          git pull --rebase
          git push
